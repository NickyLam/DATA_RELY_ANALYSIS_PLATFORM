[project]
name = "data-rely-analysis-sys"
version = "2.1.0"
description = "数据血缘分析系统 - 双TAB架构（解析层 + 展示层）"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "pydantic>=2.0.0",
    "python-multipart>=0.0.9",
]

[tool.fastapi]
entrypoint = "app.main:app"
