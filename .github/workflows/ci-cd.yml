name: Data Lineage Platform CI/CD

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  # ============================================
  # 后端代码检查和测试
  # ============================================
  backend-lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install black mypy ruff pytest pytest-cov
        pip install fastapi uvicorn sqlalchemy psycopg2-binary pydantic pydantic-settings python-dotenv neo4j redis
    
    - name: Format check with Black
      run: |
        cd backend
        black --check app/
    
    - name: Type check with mypy
      run: |
        cd backend
        mypy app/
    
    - name: Lint with ruff
      run: |
        cd backend
        ruff check app/
    
    - name: Run tests
      run: |
        cd backend
        pytest tests/ -v --cov=app --cov-report=xml
    
    - name: Upload coverage report
      uses: codecov/codecov-action@v3
      with:
        file: backend/coverage.xml

  # ============================================
  # 前端代码检查和测试
  # ============================================
  frontend-lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Lint with ESLint
      run: |
        cd frontend
        npm run lint
    
    - name: Format check with Prettier
      run: |
        cd frontend
        npm run format -- --check
    
    - name: Run tests
      run: |
        cd frontend
        npm run test
    
    - name: Build
      run: |
        cd frontend
        npm run build

  # ============================================
  # Docker 构建测试
  # ============================================
  docker-build-test:
    runs-on: ubuntu-latest
    needs: [backend-lint-and-test, frontend-lint-and-test]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build backend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: false
        tags: lineage-backend:test
    
    - name: Build frontend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: false
        tags: lineage-frontend:test

  # ============================================
  # 部署到测试环境
  # ============================================
  deploy-to-test:
    runs-on: ubuntu-latest
    needs: [docker-build-test]
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to test environment
      run: |
        echo "Deploying to test environment..."
        # TODO: 实现部署脚本

  # ============================================
  # 部署到生产环境
  # ============================================
  deploy-to-production:
    runs-on: ubuntu-latest
    needs: [docker-build-test]
    if: github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to production environment
      run: |
        echo "Deploying to production environment..."
