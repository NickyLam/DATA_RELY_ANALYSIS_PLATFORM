version: "1.0"
system: gbase
display_name: "GBase南大通用"
description: "GBase 南大通用数据库 SQL 脚本"

parser: warehouse

schemas:
  - name: gbase_dws
    display_name: "DWS 汇总层"
    ddl_path: ddl/dws
    dml_path: dml/dws

  - name: gbase_ads
    display_name: "ADS 应用层"
    ddl_path: ddl/ads
    dml_path: dml/ads

file_extensions:
  ddl: [".sql"]
  dml: [".sql"]

layer_rules:
  default_schema: "gbase_dws"
  known_schemas: ["gbase_dws", "gbase_ads"]
  synonym_rules: []
  rules:
    - pattern: "^ods_"
      layer: ods
      label: "ODS 原始数据层"
    - pattern: "^dwd_"
      layer: base
      label: "BASE 明细数据层"
    - pattern: "^dws_"
      layer: mdl
      label: "MDL 汇总数据层"
    - pattern: "^ads_"
      layer: app
      label: "APP 应用数据层"
    - pattern: "TMP|TEMP"
      layer: config
      label: "CONFIG 临时表"
  schema_rules: []
  bare_name_rules: []

  layer_order: [ods, base, mdl, app, config]
  layer_colors:
    ods: "#4ade80"
    base: "#818cf8"
    mdl: "#c084fc"
    app: "#fb923c"
    config: "#6b7280"
    other: "#6b7280"
