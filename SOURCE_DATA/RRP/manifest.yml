version: "1.0"
system: rrp
display_name: "监管报送平台"
description: "监管报送平台 Oracle 数据库导出文件，包含表结构与存储过程定义"

parser: oracle

schemas:
  - name: rrp_mdl
    display_name: "MDL 模型层"
    description: "监管报送模型层表定义与加工逻辑"
    ddl_path: ddl/rrp_mdl
    dml_path: dml/rrp_mdl

  - name: rrp_east
    display_name: "EAST 报送层"
    description: "EAST 监管报送层表定义与加工逻辑"
    ddl_path: ddl/rrp_east
    dml_path: dml/rrp_east

file_extensions:
  ddl: [".tab"]
  dml: [".prc"]

layer_rules:
  default_schema: "RRP_MDL"
  known_schemas: ["ICL", "IML", "IOL", "RRP_EAST", "RRP_MDL"]
  synonym_rules:
    - pattern: "^O_ICL_(.*)"
      target: "ICL_$1"
    - pattern: "^ICL\\.V_(.*)"
      target: "ICL_$1"
    - pattern: "^ICL\\.([A-Z].*)"
      target: "ICL_$1"
  rules:
    - pattern: "^ICL\\.V_"
      layer: ods
      label: "ODS 核心账务视图"
    - pattern: "^O_ICL_"
      layer: ods
      label: "ODS 核心账务源数据"
    - pattern: "^O_FDW_|^O_RDW_"
      layer: ods
      label: "ODS 外部数据源"
    - pattern: "^O_IML_|^O_IOL_"
      layer: base
      label: "BASE 中间层操作表"
    - pattern: "^B_"
      layer: base
      label: "BASE 基础层"
    - pattern: "^M_"
      layer: mdl
      label: "MDL 模型层"
    - pattern: "^A_|^S_"
      layer: app
      label: "APP 应用汇总层"
    - pattern: "EAST"
      layer: east
      label: "EAST 报送层"
    - pattern: "^ADD_|DIIS"
      layer: diis
      label: "DIIS 明细层"
    - pattern: "^ETL_|^CONFIG|^CODE|^TMP|^SQ_|^FUN|^GET|^CHECK|^SP_"
      layer: config
      label: "CONFIG 配置/临时表"
  schema_rules:
    - schema: "ICL"
      layer: ods
    - schema: "IML"
      layer: ods
    - schema: "IOL"
      layer: ods
    - schema: "IDL"
      layer: ods
    - schema: "ITL"
      layer: ods
    - schema: "RRP_EAST"
      default_layer: diis
    - schema: "RRP_MDL"
      default_layer: base
  bare_name_rules:
    - pattern: "^[A-Z]{1,10}$"
      layer: ods
      label: "ODS 源系统缩写表"

  layer_order: [ods, diis, base, mdl, app, east, config]
  layer_colors:
    ods: "#4ade80"
    diis: "#38bdf8"
    base: "#818cf8"
    mdl: "#c084fc"
    app: "#fb923c"
    east: "#f87171"
    config: "#6b7280"
    other: "#6b7280"
