version: "1.0"
system: fdm
display_name: "财务数据集市"
description: "财务数据集市指标配置与算法定义"

parser: indicator

schemas:
  - name: fdm_indicator
    display_name: "财务指标层"
    description: "财务指标配置与加工存储过程"
    ddl_path: config
    dml_path: dml

file_extensions:
  config: [".xlsx"]
  dml: [".proc"]

layer_rules:
  default_schema: "fdm_indicator"
  known_schemas: ["fdm_indicator"]
  synonym_rules: []
  rules:
    - pattern: "^FDL_"
      layer: base
      label: "BASE 财务基础层"
    - pattern: "^IDX_"
      layer: app
      label: "APP 指标层"
    - pattern: "TMP|TEMP|^ETL_"
      layer: config
      label: "CONFIG 临时表"
  schema_rules: []
  bare_name_rules: []

  layer_order: [base, app, config]
  layer_colors:
    base: "#818cf8"
    app: "#fb923c"
    config: "#6b7280"
    other: "#6b7280"
