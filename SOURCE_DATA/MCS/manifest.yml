version: "1.0"
system: mcs
display_name: "管理驾驶舱"
description: "管理驾驶舱绩效指标加工脚本，按功能分层组织"

parser: warehouse

schemas:
  - name: mcs_idl
    display_name: "IDL 指标基础层"
    description: "绩效指标基础表、算法配置表、指标结果表等"
    ddl_path: ddl/idl
    dml_path: dml/idl

  - name: mcs_itl
    display_name: "ITL 中间加工层"
    description: "中间加工层表（EDW各系统数据映射）"
    ddl_path: ddl/itl
    dml_path: dml/itl

file_extensions:
  ddl: [".sql"]
  dml: [".sql"]

layer_rules:
  default_schema: "mcs_idl"
  known_schemas: ["mcs_idl", "mcs_itl"]
  synonym_rules: []
  rules:
    - pattern: "^mc_index_fact"
      layer: app
      label: "APP 指标事实层"
    - pattern: "^mc_index_dim"
      layer: mdl
      label: "MDL 指标维度层"
    - pattern: "^edw_"
      layer: base
      label: "BASE EDW映射层"
    - pattern: "^ext_"
      layer: ods
      label: "ODS 外部抽数层"
    - pattern: "TMP|TEMP|^ETL_"
      layer: config
      label: "CONFIG 临时表"
    - pattern: "^O_ICL_|^O_FDW_|^O_RDW_"
      layer: ods
      label: "ODS 源系统层"
    - pattern: "^O_IML_|^O_IOL_"
      layer: base
      label: "BASE 中间层"
    - pattern: "^B_"
      layer: base
      label: "BASE 基础层"
    - pattern: "^M_"
      layer: mdl
      label: "MDL 模型层"
    - pattern: "^A_|^S_"
      layer: app
      label: "APP 应用层"
    - pattern: "^ADD_|DIIS"
      layer: diis
      label: "DIIS 明细层"
  schema_rules: []
  bare_name_rules: []

  layer_order: [ods, diis, base, mdl, app, config]
  layer_colors:
    ods: "#4ade80"
    diis: "#38bdf8"
    base: "#818cf8"
    mdl: "#c084fc"
    app: "#fb923c"
    config: "#6b7280"
    other: "#6b7280"
