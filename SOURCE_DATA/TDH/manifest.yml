version: "1.0"
system: tdh
display_name: "TDH星环大数据平台"
description: "TDH 星环大数据平台 HQL/SQL 脚本"

parser: warehouse

schemas:
  - name: tdh_dw
    display_name: "DW 数据仓库层"
    ddl_path: ddl/dw
    dml_path: dml/dw

  - name: tdh_ods
    display_name: "ODS 原始数据层"
    ddl_path: ddl/ods
    dml_path: dml/ods

file_extensions:
  ddl: [".hql", ".sql"]
  dml: [".hql", ".sql"]

layer_rules:
  default_schema: "tdh_dw"
  known_schemas: ["tdh_dw", "tdh_ods"]
  synonym_rules: []
  rules:
    - pattern: "^ods_"
      layer: ods
      label: "ODS 原始数据层"
    - pattern: "^dwd_"
      layer: base
      label: "BASE 明细数据层"
    - pattern: "^dws_"
      layer: mdl
      label: "MDL 汇总数据层"
    - pattern: "^ads_"
      layer: app
      label: "APP 应用数据层"
    - pattern: "^dim_"
      layer: mdl
      label: "MDL 维度层"
    - pattern: "TMP|TEMP"
      layer: config
      label: "CONFIG 临时表"
  schema_rules: []
  bare_name_rules: []

  layer_order: [ods, base, mdl, app, config]
  layer_colors:
    ods: "#4ade80"
    base: "#818cf8"
    mdl: "#c084fc"
    app: "#fb923c"
    config: "#6b7280"
    other: "#6b7280"
