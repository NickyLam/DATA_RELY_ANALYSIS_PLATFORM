version: "1.0"
description: "数据血缘分析系统 - 数据源注册表"

sources:
  - name: rrp
    display_name: "监管报送平台"
    path: RRP
    enabled: true
    parser: oracle
    file_extensions: [".tab", ".prc"]

  - name: edw
    display_name: "企业级数据仓库"
    path: EDW
    enabled: true
    parser: warehouse
    file_extensions: [".sql", ".ctl"]

  - name: mcs
    display_name: "管理驾驶舱"
    path: MCS
    enabled: true
    parser: warehouse
    file_extensions: [".sql", ".conf"]

  - name: fdm
    display_name: "财务数据集市"
    path: FDM
    enabled: true
    parser: indicator
    file_extensions: [".xlsx", ".proc"]

  - name: tdh
    display_name: "TDH星环大数据平台"
    path: TDH
    enabled: false
    parser: warehouse
    file_extensions: [".hql", ".sql"]
    env_override:
      enabled: TDH_DATA_DIR

  - name: gbase
    display_name: "GBase南大通用"
    path: GBASE
    enabled: false
    parser: warehouse
    file_extensions: [".sql"]
    env_override:
      enabled: GBASE_DATA_DIR

  - name: pam
    display_name: "绩效考核系统"
    path: PAM
    enabled: false
    parser: warehouse
    file_extensions: [".sql"]

  - name: ccr
    display_name: "公司经营管理平台"
    path: CCR
    enabled: false
    parser: warehouse
    file_extensions: [".sql"]

  - name: icr
    display_name: "同业经营管理平台"
    path: ICR
    enabled: false
    parser: warehouse
    file_extensions: [".sql"]

  - name: brt
    display_name: "零售经营管理平台"
    path: BRT
    enabled: false
    parser: warehouse
    file_extensions: [".sql"]
