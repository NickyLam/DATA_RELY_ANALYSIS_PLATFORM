version: "1.0"
system: edw
display_name: "企业级数据仓库"
description: "企业级数据仓库 SQL 脚本，按数仓分层组织"

parser: warehouse

schemas:
  - name: edw_icl
    display_name: "ICL 核心账务层"
    description: "核心系统公共表（科目、总账、担保等）"
    ddl_path: ddl/icl
    dml_path: dml/icl

  - name: edw_idl
    display_name: "IDL 接口明细层"
    description: "接口层表（AML反洗钱、资产、渠道、客户、产品等）"
    ddl_path: ddl/idl
    dml_path: dml/idl

  - name: edw_iml
    display_name: "IML 中间模型层"
    description: "中间模型表（协议、事件、财务、参考数据等）"
    ddl_path: ddl/iml
    dml_path: dml/iml

  - name: edw_iol
    display_name: "IOL 操作层"
    description: "操作层表（各业务系统原始数据）"
    ddl_path: ddl/iol
    dml_path: dml/iol

file_extensions:
  ddl: [".sql"]
  dml: [".sql"]
  ctl: [".ctl"]

layer_rules:
  default_schema: "edw_iml"
  known_schemas: ["edw_icl", "edw_idl", "edw_iml", "edw_iol"]
  synonym_rules: []
  rules:
    - pattern: "^O_ICL_"
      layer: ods
      label: "ODS 核心账务源数据"
    - pattern: "^O_FDW_|^O_RDW_"
      layer: ods
      label: "ODS 外部数据源"
    - pattern: "^O_IML_|^O_IOL_"
      layer: base
      label: "BASE 中间层操作表"
    - pattern: "^B_"
      layer: base
      label: "BASE 基础层"
    - pattern: "^M_"
      layer: mdl
      label: "MDL 模型层"
    - pattern: "^A_|^S_"
      layer: app
      label: "APP 应用层"
    - pattern: "^ADD_|DIIS"
      layer: diis
      label: "DIIS 明细层"
    - pattern: "^ETL_|^CONFIG|^CODE|^TMP|^SQ_|^FUN|^GET|^CHECK|^SP_"
      layer: config
      label: "CONFIG 配置/临时表"
  schema_rules: []
  bare_name_rules: []

  layer_order: [ods, diis, base, mdl, app, config]
  layer_colors:
    ods: "#4ade80"
    diis: "#38bdf8"
    base: "#818cf8"
    mdl: "#c084fc"
    app: "#fb923c"
    config: "#6b7280"
    other: "#6b7280"
